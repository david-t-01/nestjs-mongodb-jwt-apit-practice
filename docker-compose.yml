version: "3"

services:
  mongodb:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - 28017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_APP_DATABASE: ${MONGO_APP_DATABASE}
      MONGO_APP_USER: ${MONGO_APP_USER}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    volumes:
      - ../mongodb_data:/data/db
      - ./docker/mongo-init:/docker-entrypoint-initdb.d:ro

  app:
    container_name: api-nestjs-app-with-mongodb
    build:
      context: .
      dockerfile: ./docker/app.Dockerfile
    environment:
      MONGODB_URI: mongodb://${MONGO_APP_USER}:${MONGO_APP_PASSWORD}@mongodb:27017/${MONGO_APP_DATABASE}?authSource=${MONGO_APP_DATABASE}
    depends_on:
      - mongodb
    ports:
      - 3000:3000
